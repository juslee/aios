name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt + clippy + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-unknown-none, aarch64-unknown-uefi
          components: rust-src, llvm-tools, clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - run: just check

  build-release:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-unknown-none, aarch64-unknown-uefi
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - run: just build-release

  test:
    name: Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-unknown-none, aarch64-unknown-uefi
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - run: just test

  security:
    name: Security (audit + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-unknown-none, aarch64-unknown-uefi
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny --locked
      - run: just audit
      - run: just deny

  miri:
    name: Miri (unsafe UB detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-unknown-none, aarch64-unknown-uefi
          components: rust-src, llvm-tools, miri
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - run: just miri
