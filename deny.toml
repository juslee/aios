# cargo-deny configuration for AIOS
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
# All vulnerability advisories emit errors by default (no config needed).
# Unmaintained: only error for direct workspace deps, not transitive.
unmaintained = "workspace"
yanked = "warn"

[licenses]
# AIOS is BSD-2-Clause. Only these licenses are permitted (all others denied).
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
